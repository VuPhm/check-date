services:
  api:
    build:
      context: ../..
      dockerfile: deploy/pilot/Dockerfile.api
    environment:
      PILOT_STORE_CODE: ${PILOT_STORE_CODE:-0001}
      PILOT_MANAGER_PASSWORD: ${PILOT_MANAGER_PASSWORD:?set-a-strong-password}
      PILOT_JOIN_CODE: ${PILOT_JOIN_CODE:-1234}
      SESSION_DAYS: ${SESSION_DAYS:-30}
    volumes:
      - ./pilot-data:/data
      - ./backups:/backups
    restart: unless-stopped
  web:
    image: caddy:2-alpine
    ports:
      - "8080:8080"
    volumes:
      - ../../dist:/srv:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
    restart: unless-stopped
